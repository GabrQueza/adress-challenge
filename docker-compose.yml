version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: address_challenge_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: address_challenge_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=AddressChallenge;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
    ports:
      - "8080:8080"
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: address_challenge_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api

volumes:
  sql_data:
